<!DOCTYPE html>
<html>
<head>
<title>Register | AI Social Chatbot</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family: Arial, Helvetica, sans-serif;
}

/* ===== ANIMATED BACKGROUND ===== */
body{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:
   linear-gradient(120deg, rgba(44,182,125,.7), rgba(0,0,0,.85)),
   url("https://images.unsplash.com/photo-1677442136019-21780ecad995") center/cover no-repeat;
 overflow:hidden;
 color:#fff;
}

/* ===== FLOATING PARTICLES ===== */
body::before{
 content:"";
 position:absolute;
 inset:0;
 background:
  radial-gradient(circle at 20% 20%, #2cb67d 2px, transparent 2px),
  radial-gradient(circle at 80% 40%, #7f5af0 2px, transparent 2px),
  radial-gradient(circle at 50% 80%, #ffffff 1px, transparent 1px);
 background-size:150px 150px;
 animation: moveBg 25s linear infinite;
 opacity:.4;
}

@keyframes moveBg{
 from{background-position:0 0;}
 to{background-position:600px 900px;}
}

/* ===== REGISTER BOX ===== */
.box{
 position:relative;
 z-index:1;
 width:340px;
 padding:30px;
 border-radius:15px;
 background:rgba(255,255,255,.08);
 backdrop-filter: blur(14px);
 box-shadow:
  0 0 30px rgba(44,182,125,.4),
  inset 0 0 10px rgba(255,255,255,.05);
 animation: glow 3s infinite alternate;
}

@keyframes glow{
 from{box-shadow:0 0 20px rgba(44,182,125,.4);}
 to{box-shadow:0 0 35px rgba(44,182,125,.8);}
}

/* ===== TEXT ===== */
h2{
 text-align:center;
 margin-bottom:20px;
 letter-spacing:1px;
}

/* ===== INPUT ===== */
input{
 width:100%;
 padding:12px;
 margin-top:12px;
 border-radius:8px;
 border:none;
 outline:none;
 background:rgba(255,255,255,.12);
 color:#fff;
 font-size:14px;
}

input::placeholder{
 color:#ccc;
}

/* ===== BUTTON ===== */
button{
 width:100%;
 margin-top:18px;
 padding:12px;
 border:none;
 border-radius:8px;
 background:linear-gradient(135deg,#2cb67d,#7f5af0);
 color:#000;
 font-weight:bold;
 cursor:pointer;
 transition:.3s;
}

button:hover{
 transform:translateY(-2px);
 box-shadow:0 8px 25px rgba(44,182,125,.6);
}

/* ===== LINK ===== */
a{
 display:block;
 text-align:center;
 margin-top:14px;
 color:#ccc;
 text-decoration:none;
 font-size:14px;
}

a:hover{color:#fff;}

</style>
</head>

<body>

<div class="box">
 <h2>📝 Registration</h2>

 <form method="post" action="/register">
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <button type="submit">Register</button>
 </form>

 <a href="/">Back to login</a>
</div>

</body>
</html>
