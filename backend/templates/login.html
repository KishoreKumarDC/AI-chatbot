<!DOCTYPE html>
<html>
<head>
<title>Admin Login | AI Social Chatbot</title>
<style>

/* ===== RESET ===== */
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family: Arial, Helvetica, sans-serif;
}

/* ===== BACKGROUND ===== */
body{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:
   linear-gradient(120deg, rgba(34, 32, 40, 0.25), rgba(0,0,0,.9)),
   url("https://images.unsplash.com/photo-1677442136019-21780ecad995") center/cover no-repeat;
 overflow:hidden;
 color:#fff;
 position:relative;
}

/* ===== FLOATING AI DOTS ===== */
body::before{
 content:"";
 position:absolute;
 inset:0;
 background:
  radial-gradient(circle at 20% 30%, #7f5af0 2px, transparent 2px),
  radial-gradient(circle at 80% 60%, #2cb67d 2px, transparent 2px),
  radial-gradient(circle at 50% 80%, #ffffff 1px, transparent 1px);
 background-size:120px 120px;
 animation: float 20s linear infinite;
 opacity:.3;
}

@keyframes float{
 from{background-position:0 0;}
 to{background-position:500px 800px;}
}

/* ===== 3D HERO TITLE ===== */
.hero-title{
 font-size:42px;
 font-weight:900;
 text-align:center;
 background:linear-gradient(45deg,#373939,#0c0c0c);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 text-shadow:
 2px 2px 0px #cfd0d0,
 4px 4px 10px rgba(0,0,0,0.6);
 margin-bottom:10px;
 animation:floatText 3s ease-in-out infinite;
 z-index:1;
}

@keyframes floatText{
 0%{transform:translateY(0px);}
 50%{transform:translateY(-8px);}
 100%{transform:translateY(0px);}
}

/* ===== TAGLINE ===== */
.tagline{
 text-align:center;
 font-size:16px;
 color:#cccccc;
 margin-bottom:30px;
 z-index:1;
}

/* ===== LOGIN BOX ===== */
.box{
 position:relative;
 z-index:1;
 width:340px;
 padding:30px;
 border-radius:14px;
 background:rgba(255,255,255,.08);
 backdrop-filter: blur(12px);
 box-shadow:
  0 0 25px rgba(127,90,240,.4),
  inset 0 0 10px rgba(255,255,255,.05);
 animation: glow 3s infinite alternate;
}

@keyframes glow{
 from{box-shadow:0 0 20px rgba(127,90,240,.4);}
 to{box-shadow:0 0 35px rgba(127,90,240,.8);}
}

/* ===== TEXT ===== */
.box h2{
 text-align:center;
 margin-bottom:20px;
 letter-spacing:1px;
}

/* ===== INPUTS ===== */
input{
 width:100%;
 padding:12px;
 margin-top:12px;
 border-radius:8px;
 border:none;
 outline:none;
 background:rgba(255,255,255,.12);
 color:#fff;
 font-size:14px;
}

input::placeholder{
 color:#ccc;
}

/* ===== BUTTON ===== */
button{
 width:100%;
 margin-top:18px;
 padding:12px;
 border:none;
 border-radius:8px;
 background:linear-gradient(135deg,#7f5af0,#2cb67d);
 color:#fff;
 font-weight:bold;
 cursor:pointer;
 transition:.3s;
}

button:hover{
 transform:translateY(-2px);
 box-shadow:0 8px 25px rgba(127,90,240,.6);
}

/* ===== LINK ===== */
a{
 display:block;
 text-align:center;
 margin-top:14px;
 color:#ccc;
 text-decoration:none;
 font-size:14px;
}

a:hover{
 color:#fff;
}

</style>
</head>

<body>

<h1 class="hero-title">AI Social Assistant</h1>
<p class="tagline">
One AI. Multiple Platforms. Unlimited Possibilities.
</p>

<div class="box">
 <h2>🔐 Secure Login</h2>

 <form method="post" action="/login">
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <button type="submit">Login</button>
 </form>

 <a href="/register">New user? Register</a>
</div>

</body>
</html>
